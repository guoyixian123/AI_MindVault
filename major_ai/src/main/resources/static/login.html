<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI法律助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">AI法律助手</h1>
            <p class="text-gray-600 mt-2">您的私人法律智能顾问</p>
        </div>

        <!-- 登录/注册切换标签 -->
        <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
            <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-2 rounded-md text-sm font-medium transition-colors bg-white text-purple-600 shadow-sm">
                登录
            </button>
            <button id="registerTab" onclick="switchTab('register')" class="flex-1 py-2 rounded-md text-sm font-medium transition-colors text-gray-600">
                注册
            </button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="loginUsername" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                       placeholder="请输入用户名">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="loginPassword" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                       placeholder="请输入密码">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-medium hover:bg-purple-700 transition-colors">
                登录
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="regUsername" required minlength="3" maxlength="20"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                       placeholder="3-20个字符">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="regPassword" required minlength="6" maxlength="50"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                       placeholder="6-50个字符">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" id="regConfirmPassword" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                       placeholder="再次输入密码">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-medium hover:bg-purple-700 transition-colors">
                注册
            </button>
        </form>

        <!-- 错误提示 -->
        <div id="errorMsg" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>

        <!-- 成功提示 -->
        <div id="successMsg" class="hidden mt-4 p-3 bg-green-100 text-green-700 rounded-lg text-sm"></div>
    </div>

    <script>
        const API_BASE = '/api/auth';

        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.getElementById('loginTab').classList.toggle('bg-white', tab === 'login');
            document.getElementById('loginTab').classList.toggle('text-purple-600', tab === 'login');
            document.getElementById('loginTab').classList.toggle('shadow-sm', tab === 'login');
            document.getElementById('registerTab').classList.toggle('bg-white', tab === 'register');
            document.getElementById('registerTab').classList.toggle('text-purple-600', tab === 'register');
            document.getElementById('registerTab').classList.toggle('shadow-sm', tab === 'register');
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideMessages();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    window.location.href = '/index.html';
                } else {
                    showError(data.message || '登录失败');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideMessages();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    showSuccess('注册成功，即将跳转...');
                    setTimeout(() => window.location.href = '/index.html', 1500);
                } else {
                    showError(data.message || '注册失败');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
            }
        }

        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
